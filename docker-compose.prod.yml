# ── 운영용 Docker Compose ──
# 사용법: docker compose -f docker-compose.prod.yml up -d
#
# 사전 조건:
#   1. .env에 JWT_SECRET, DB_PASSWORD 설정
#   2. HTTPS 인증서 발급 (아래 certbot 명령어 참고)
#
# 최초 인증서 발급:
#   docker compose -f docker-compose.prod.yml run --rm certbot \
#     certonly --webroot -w /var/www/certbot -d your-domain.com
#
# 인증서 갱신 (cron 등록 권장):
#   docker compose -f docker-compose.prod.yml run --rm certbot renew

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: newspick
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${APP_IMAGE:-newspick-app}
    build: .
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://db:3306/newspick?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION_HOURS: ${JWT_ACCESS_EXPIRATION_HOURS:-1}
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS:-7}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-meta/llama-3.3-70b-instruct}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_HOST: ${APP_HOST}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - app
    command: >
      /bin/sh -c '
      TEMPLATE=/etc/nginx/templates/http-only.conf.template;
      if [ -f "/etc/letsencrypt/live/$${APP_HOST}/fullchain.pem" ] &&
         [ -f "/etc/letsencrypt/live/$${APP_HOST}/privkey.pem" ]; then
        TEMPLATE=/etc/nginx/templates/https.conf.template;
      fi;
      envsubst < "$${TEMPLATE}" > /etc/nginx/conf.d/default.conf;
      nginx -g "daemon off;"
      '

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet || true; sleep 12h & wait $${!}; done;'"

volumes:
  mysql-data:
  certbot-www:
  certbot-conf:
