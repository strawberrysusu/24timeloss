name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            if [ ! -d "$HOME/24timeloss/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$HOME/24timeloss"
            fi

            cd "$HOME/24timeloss"
            git fetch origin main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              cp .env.example .env
              echo ".env file is missing on EC2. Fill it on the server, then re-run the workflow."
              exit 1
            fi

            APP_HOST=$(grep '^APP_HOST=' .env | cut -d '=' -f 2- | tr -d '\r')
            if [ -z "$APP_HOST" ]; then
              echo "APP_HOST is missing in .env"
              exit 1
            fi

            docker compose -f docker-compose.prod.yml up -d --build db app nginx --remove-orphans

            if [ ! -f "$HOME/24timeloss/.prod-certs-ready" ]; then
              docker compose -f docker-compose.prod.yml run --rm --entrypoint certbot certbot \
                certonly --webroot -w /var/www/certbot \
                -d "$APP_HOST" \
                --non-interactive \
                --agree-tos \
                --register-unsafely-without-email

              touch "$HOME/24timeloss/.prod-certs-ready"
            fi

            docker compose -f docker-compose.prod.yml restart nginx
            docker compose -f docker-compose.prod.yml up -d certbot --remove-orphans

            echo "Waiting for HTTPS health check..."
            for i in 1 2 3 4 5 6 7 8 9; do
              if curl --fail --silent --resolve "$APP_HOST:443:127.0.0.1" "https://$APP_HOST/health" > /dev/null; then
                docker compose -f docker-compose.prod.yml ps
                exit 0
              fi
              sleep 10
            done

            docker compose -f docker-compose.prod.yml ps
            echo "Health check failed"
            exit 1
