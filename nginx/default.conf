server {
    listen 80;
    server_name _;

    # Let's Encrypt 인증용 (certbot이 이 경로로 확인한다)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지 요청은 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    # Let's Encrypt 인증서 경로
    ssl_certificate     /etc/letsencrypt/live/newspick/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newspick/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 요청 크기 제한 (기사 본문이 길 수 있으므로 여유 있게)
    client_max_body_size 10M;

    # Spring Boot로 프록시
    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
