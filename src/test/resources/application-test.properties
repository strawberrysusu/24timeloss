# 테스트 전용 DB 설정이다.
# 메모리에서만 동작하는 H2를 MySQL 호환 모드로 사용한다.
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:newspick;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

# 테스트는 H2 인메모리라 Flyway 비활성화, Hibernate가 테이블 생성
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# 테스트에서는 실제 AI API를 호출하지 않는다 (환경변수에 키가 있어도 무시)
ai.api-key=
ai.mock-enabled=true
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
