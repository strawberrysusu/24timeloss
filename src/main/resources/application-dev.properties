# ── 개발 환경 (로컬) ──
# ./gradlew bootRun 하면 이 설정이 적용된다.

# 로컬 MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/newspick?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234

# Flyway가 스키마를 관리한다. Hibernate는 검증만 한다.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway baseline은 application.properties에서 공통 관리
