spring.application.name=NewsSummaryProject

# 기본 프로필은 dev (로컬 개발)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JPA 공통
spring.jpa.open-in-view=false

# Flyway — 모든 환경 공통 (테스트는 application-test.properties에서 비활성화)
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

# AI 요약 API (환경변수로 관리)
ai.api-key=${AI_API_KEY:}
ai.model=${AI_MODEL:meta/llama-3.3-70b-instruct}
ai.base-url=${AI_BASE_URL:https://integrate.api.nvidia.com/v1/chat/completions}
ai.timeout=${AI_TIMEOUT:60}
ai.mock-enabled=${AI_MOCK_ENABLED:false}

# JWT
jwt.secret=${JWT_SECRET:defaultDevSecretKeyForLocalDevelopmentOnly2024!@#$%}
jwt.access-expiration-hours=${JWT_ACCESS_EXPIRATION_HOURS:1}
jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

# Google OAuth2 (환경변수 미설정 시 OAuth2 비활성화)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}

# Naver OAuth2 로그인 (검색 API와 다른 별도 애플리케이션 등록 필요)
# https://developers.naver.com → "네이버 로그인" 애플리케이션 등록
# Callback URL: {도메인}/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.client-id=${NAVER_LOGIN_CLIENT_ID:}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_LOGIN_CLIENT_SECRET:}
spring.security.oauth2.client.registration.naver.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.naver.scope=name,email
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# 네이버 뉴스 검색 API (https://developers.naver.com)
naver.api.client-id=${NAVER_CLIENT_ID:}
naver.api.client-secret=${NAVER_CLIENT_SECRET:}
naver.news.collect-enabled=${NAVER_NEWS_COLLECT_ENABLED:false}
naver.news.collect-size=${NAVER_NEWS_COLLECT_SIZE:5}

# 자동수집 기사 보관 기간 (일). 0이면 정리 비활성화.
# - 사용자가 직접 작성한 기사 / 누군가 저장한 기사는 절대 삭제 안 됨.
# - 매일 새벽 3시에 실행됨.
article.retention-days=${ARTICLE_RETENTION_DAYS:0}

# Actuator — health만 공개 (운영에서 metrics 노출 방지)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
