# 프로젝트 이름. 로그 등에서 현재 애플리케이션을 구분할 때 사용한다.
spring.application.name=NewsSummaryProject

# MySQL 연결 정보다.
# newspick 데이터베이스에 root / 1234 계정으로 접속한다.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/newspick?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234

# JPA/Hibernate 동작 방식 설정이다.
# update: 엔티티를 기준으로 테이블 구조를 자동 반영한다.
# 개발 초반에는 편하지만, 운영 단계에서는 보통 별도 마이그레이션 도구를 쓴다.
spring.jpa.hibernate.ddl-auto=update

# 실행되는 SQL을 콘솔에서 확인할 수 있다.
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# SQL 로그를 보기 좋게 정렬한다.
spring.jpa.properties.hibernate.format_sql=true

# 컬렉션 조회 최적화 시 사용할 기본 배치 크기다.
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# DB와 애플리케이션의 시간대 차이로 생기는 문제를 줄이기 위한 설정이다.
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
