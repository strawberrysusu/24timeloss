spring.application.name=NewsSummaryProject

# 기본 프로필은 dev (로컬 개발)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JPA 공통
spring.jpa.open-in-view=false

# Flyway — 모든 환경 공통 (테스트는 application-test.properties에서 비활성화)
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

# AI 요약 API (환경변수로 관리)
ai.api-key=${AI_API_KEY:}
ai.model=${AI_MODEL:meta/llama-3.3-70b-instruct}
ai.base-url=${AI_BASE_URL:https://integrate.api.nvidia.com/v1/chat/completions}
ai.timeout=${AI_TIMEOUT:60}
ai.mock-enabled=${AI_MOCK_ENABLED:false}

# JWT
jwt.secret=${JWT_SECRET:defaultDevSecretKeyForLocalDevelopmentOnly2024!@#$%}
jwt.access-expiration-hours=${JWT_ACCESS_EXPIRATION_HOURS:1}
jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

# Google OAuth2 (환경변수 미설정 시 OAuth2 비활성화)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}

# Actuator — health만 공개 (운영에서 metrics 노출 방지)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
