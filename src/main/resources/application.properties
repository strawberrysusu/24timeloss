spring.application.name=NewsSummaryProject

# Datasource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/newspick?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

# AI 요약 API (환경변수로 관리 — application.properties에 키를 직접 쓰지 않는다)
# 기본값은 NVIDIA NIM (Kimi). OpenAI 호환 API면 URL만 바꾸면 된다.
ai.api-key=${AI_API_KEY:}
ai.model=${AI_MODEL:meta/llama-3.3-70b-instruct}
ai.base-url=${AI_BASE_URL:https://integrate.api.nvidia.com/v1/chat/completions}
ai.timeout=${AI_TIMEOUT:30}
ai.mock-enabled=${AI_MOCK_ENABLED:false}

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
